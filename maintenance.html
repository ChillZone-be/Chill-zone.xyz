<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsmodus - Chill-zone.xyz</title>
    <link href="https://fonts.googleapis.com/css2?family=Lekton&family=Quicksand&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: "Lekton", monospace;
            background-color: #1e1e2e;
            color: #f5e0dc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .maintenance-container {
            background: linear-gradient(135deg, #282a36, #3b3f51);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            margin: 1rem;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        h1 {
            font-family: "Quicksand", sans-serif;
            color: #ff79c6;
            font-size: 2.5em;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .emoji {
            font-size: 4em;
            margin: 1rem 0;
        }
        .progress {
            width: 100%;
            height: 10px;
            background: #1e1e2e;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            position: absolute;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #ff79c6, #50fa7b);
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress {
            0% { left: -50%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="emoji">🛠️</div>
        <h1>Wartungsmodus</h1>
        <p>Wir arbeiten gerade an Verbesserungen für die Chill Zone.</p>
        <p>Bitte schaue später wieder vorbei!</p>
        <div class="progress">
            <div class="progress-bar"></div>
        </div>
    </div>
</body>
</html>
